<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Primer Mes Amor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

        :root {
            --turquesa: #40E0D0;
            --rojo-pasion: #ff4d4d;
            --azul-profundo: #0077be;
            --blanco: #ffffff;
            --delfin-color: #5c7c9e; /* Color realista azul acero */
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Montserrat', sans-serif;
            background: #000;
        }

        /* --- CAPA 0: BOTÓN INICIO --- */
        #overlay {
            position: fixed; inset: 0; 
            background: radial-gradient(circle, #fff 0%, #dbeafe 100%); 
            z-index: 9999; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            padding: 20px 40px; font-size: 1.5rem; 
            background: var(--rojo-pasion); color: white; border: none; 
            border-radius: 60px; cursor: pointer; 
            box-shadow: 0 10px 30px rgba(255, 77, 77, 0.5); 
            transition: all 0.3s ease;
        }

        #start-btn:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(255, 77, 77, 0.7); }

        /* --- CAPA 1: INTRO DE AGUA --- */
        #intro-layer {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #87CEEB 0%, var(--turquesa) 100%);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.5s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* Contenedor del Delfín Dinámico */
        .dolphin-container {
            width: 200px;
            height: 200px;
            position: relative;
            transform: translateY(120vh) rotate(-90deg); /* Inicia muy abajo y rotado */
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }

        /* NUEVO DELFÍN REALISTA CON CSS PURO */
        .dolphin-body {
            position: absolute;
            width: 150px;
            height: 60px;
            background: var(--delfin-color);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            top: 70px; left: 25px;
        }

        /* Ojo */
        .dolphin-body::before {
            content: '';
            position: absolute;
            width: 10px; height: 10px;
            background: #111;
            border-radius: 50%;
            top: 20px; left: 30px;
            border: 2px solid #fff;
        }

        /* Morro/Hocico */
        .dolphin-beak {
            position: absolute;
            width: 40px; height: 20px;
            background: var(--delfin-color);
            border-radius: 50%;
            top: 85px; left: 10px;
            transform: rotate(-10deg);
        }

        /* Aleta Dorsal */
        .dolphin-fin-dorsal {
            position: absolute;
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-bottom: 40px solid var(--delfin-color);
            top: 45px; left: 80px;
            border-radius: 0 0 50% 50%;
            transform: rotate(-10deg);
        }

        /* Cola (Flukes) */
        .dolphin-tail {
            position: absolute;
            width: 60px; height: 40px;
            top: 80px; left: 140px;
        }

        .dolphin-tail::before, .dolphin-tail::after {
            content: '';
            position: absolute;
            width: 40px; height: 25px;
            background: var(--delfin-color);
            border-radius: 50%;
        }
        .dolphin-tail::before { transform: rotate(30deg); top: -5px; }
        .dolphin-tail::after { transform: rotate(-30deg); top: 15px; }

        /* Efecto Visual de Salpicadura (Splash) */
        .dolphin-container::after {
            content: '';
            position: absolute;
            bottom: -20px; left: 50%;
            transform: translateX(-50%) scale(0);
            width: 100px; height: 40px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0;
            z-index: -1;
        }

        /* Animación del Clavado Dinámico y Realista */
        .animate-dive {
            animation: diveSequence 4.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* Activación de la salpicadura visual */
        .animate-dive::after {
            animation: splashVisual 1s ease-out 2.2s forwards; /* Sincronizado con el audio */
        }

        @keyframes diveSequence {
            0% { 
                transform: translate(0, 150px) rotate(-95deg); 
                opacity: 0; 
            }
            10% { opacity: 1; }
            /* Apogeo del salto: Se curva hacia adelante */
            40% { 
                transform: translate(100px, -400px) rotate(-15deg); 
            }
            /* Caída: Rotación para entrar de cabeza */
            65% { 
                transform: translate(150px, -100px) rotate(60deg); 
            }
            /* Entrada al agua (Splash): Vertical */
            75% { 
                transform: translate(160px, 150px) rotate(110deg); 
                opacity: 1;
                filter: blur(0);
            }
            /* Inmersión profunda: Se desvanece bajo el agua */
            100% { 
                transform: translate(170px, 1000px) rotate(130deg); 
                opacity: 0; 
                filter: blur(5px);
            }
        }

        @keyframes splashVisual {
            0% { transform: translateX(-50%) scale(0); opacity: 0; }
            50% { transform: translateX(-50%) scale(1.5); opacity: 1; }
            100% { transform: translateX(-50%) scale(2.5); opacity: 0; }
        }

        /* --- CAPA 2: SISTEMA DE BURBUJAS --- */
        #bubble-canvas {
            position: fixed; inset: 0; z-index: 500; pointer-events: none;
        }

        /* --- CAPA 3: LANDING EMOCIONAL --- */
        #landing-layer {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d); /* Degradado más rico */
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transform: scale(1.1); transition: all 2s ease;
            text-align: center; color: white; z-index: 100;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .content-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            padding: 60px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            max-width: 85%; width: 450px;
        }

        h1 { font-size: 2.8rem; margin-bottom: 0.5rem; font-weight: 700; letter-spacing: -1px; }
        h2 { font-size: 5rem; color: var(--rojo-pasion); margin: 20px 0; text-shadow: 0 0 15px rgba(255,77,77,0.6); }
        p { font-size: 1.1rem; line-height: 1.6; opacity: 0.9; }

        .reveal-text {
            opacity: 0; transform: translateY(30px); transition: 1s all cubic-bezier(0.22, 1, 0.36, 1);
        }

        .show { opacity: 1; transform: translateY(0); }

        /* Media Query para Móviles */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            h2 { font-size: 3.5rem; }
            .content-box { padding: 40px; }
            .dolphin-container { transform: translateY(120vh) rotate(-90deg) scale(0.7); }
            @keyframes diveSequence {
                0% { transform: translate(0, 150px) rotate(-95deg) scale(0.7); opacity: 0; }
                10% { opacity: 1; }
                40% { transform: translate(30px, -350px) rotate(-15deg) scale(0.7); }
                65% { transform: translate(50px, -100px) rotate(60deg) scale(0.7); }
                75% { transform: translate(55px, 150px) rotate(110deg) scale(0.7); opacity: 1; }
                100% { transform: translate(60px, 1000px) rotate(130deg) scale(0.7); opacity: 0; }
            }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">Haz clic aquí🐬</button>
    </div>

    <div id="intro-layer">
        <div class="dolphin-container" id="dolphin">
            <div class="dolphin-beak"></div>
            <div class="dolphin-body"></div>
            <div class="dolphin-fin-dorsal"></div>
            <div class="dolphin-tail"></div>
        </div>
    </div>

    <canvas id="bubble-canvas"></canvas>

    <div id="landing-layer">
        <div class="content-box">
            <h1 class="reveal-text" id="t1">Feliz Primer Mes</h1>
            <h2 class="reveal-text" id="t2">❤️</h2>
            <p class="reveal-text" id="t3">Como gorda en tobogán, contigo yo me dejo llevar...</p>
            <p class="reveal-text" id="t4">Gracias por sumergirte en esta aventura conmigo. Te amo.</p>
        </div>
    </div>

    <audio id="audio-splash" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3" preload="auto"></audio>-
    <script>
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const dolphin = document.getElementById('dolphin');
        const intro = document.getElementById('intro-layer');
        const landing = document.getElementById('landing-layer');
        const audio = document.getElementById('audio-splash');

        startBtn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
            initExperience();
        });

        function initExperience() {
            // Ajustar volumen del audio
            audio.volume = 0.6;

            // 1. Inicia animación Delfín
            dolphin.classList.add('animate-dive');
            
            // 2. Sincronización de Audio y Burbujas (en el chapuzón aprox 2.2s)
            setTimeout(() => {
                audio.play();
                startBubbles(); 
            }, 2200);

            // 3. Transición de Capas
            setTimeout(() => {
                intro.style.transform = 'translateY(-100%)';
                landing.style.opacity = '1';
                landing.style.transform = 'scale(1)';
                revealTextProgresive();
            }, 4300); // Ligeramente más tarde para dejar terminar la inmersión
        }

        function revealTextProgresive() {
            const lines = ['t1', 't2', 't3', 't4'];
            lines.forEach((id, index) => {
                setTimeout(() => {
                    document.getElementById(id).classList.add('show');
                }, 1000 * (index + 1)); // Revelado más pausado y elegante
            });
        }

        // --- Sistema de Partículas Realistas (Burbujas con Glow) ---
        function startBubbles() {
            const canvas = document.getElementById('bubble-canvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            let particles = [];

            class Bubble {
                constructor() {
                    this.init();
                }

                init() {
                    this.x = Math.random() * canvas.width;
                    // Aparecen desde abajo con variación
                    this.y = canvas.height + Math.random() * 200; 
                    this.size = Math.random() * 4 + 1; // Tamaños variados
                    this.speed = Math.random() * 2 + 0.5; // Velocidades variadas
                    this.opacity = Math.random() * 0.3 + 0.1;
                    // Oscilación lateral para realismo
                    this.wobble = Math.random() * Math.PI * 2;
                    this.wobbleSpeed = Math.random() * 0.05 + 0.01;
                }

                update() {
                    this.y -= this.speed;
                    this.wobble += this.wobbleSpeed;
                    this.x += Math.sin(this.wobble) * 0.5; // Movimiento zig-zag suave

                    // Resetear cuando salen por arriba
                    if (this.y < -10) {
                        this.init();
                    }
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    
                    // Efecto Glow (Resplandor) en las burbujas
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'rgba(64, 224, 208, 0.5)'; // Turquesa glow
                    
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                    ctx.fill();
                    
                    // Resetear shadow para no afectar otras cosas
                    ctx.shadowBlur = 0; 
                }
            }

            // Crear más burbujas para mayor inmersión
            for(let i=0; i<150; i++) {
                particles.push(new Bubble());
            }

            function animate() {
                // Fondo del canvas ligeramente transparente para efecto trail
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(p => { 
                    p.update(); 
                    p.draw(); 
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
